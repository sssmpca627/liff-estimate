<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPhone修理お見積もり</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<div class="container">

    <h1>📱 iPhone修理お見積もり</h1>

    <!-- 機種選択 -->
    <div class="card">

        <h2>機種</h2>

        <select id="model">
            <option value="">選択してください</option>
        </select>

    </div>

    <!-- 修理内容 -->
    <div class="card">

        <h2>修理内容</h2>

        <div id="repair-list">
            <!-- JavaScriptで生成 -->
        </div>

    </div>

    <!-- 見積もり -->
    <div class="card">

        <h2>お見積もり</h2>

        <div id="estimate">

            <p class="empty">
                修理内容を選択してください
            </p>

        </div>

        <hr>

        <div class="total">

            <span>合計</span>

            <span id="totalPrice">
                ¥0(税込)
            </span>

        </div>

    </div>

    <!-- ボタン -->

    <button id="reserveButton">

        ■ この内容で予約する

    </button>

</div>

<script src="prices.js"></script>
<script src="script.js"></script>
<script src="liff.js"></script>

</body>
</html>
